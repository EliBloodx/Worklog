{% extends 'base.html' %}

{% block title %}Iniciar sesion{% endblock %}

{% block content %}
<div class="text-center text-white mb-4">
    <div class="mb-3" style="font-size:2.8rem;">
        <i class="bi bi-clock-history"></i>
    </div>
    <h1 class="h3 fw-bold">WorkLog</h1>
    <p class="opacity-75 mb-0">Sistema de control de horas</p>
</div>

<div class="card border-0 shadow-lg" style="width:100%;max-width:400px;">
    <div class="card-body p-4 p-md-5">
        <h2 class="h5 fw-bold mb-1">Iniciar sesion</h2>
        <p class="text-muted small mb-4">Ingresa tus credenciales para continuar.</p>

        <form method="post" action="{{ url_for('auth.login', next=next_url) }}" class="row g-3">
            <div class="col-12">
                <label class="form-label">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input class="form-control" type="text" name="username"
                           required autocomplete="username" placeholder="Tu usuario">
                </div>
            </div>
            <div class="col-12">
                <label class="form-label">Contrasena</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input class="form-control" type="password" name="password"
                           required autocomplete="current-password" placeholder="••••••••">
                </div>
            </div>
            <div class="col-12 d-grid mt-2">
                <button class="btn btn-primary btn-lg d-flex align-items-center justify-content-center gap-2" type="submit">
                    <i class="bi bi-box-arrow-in-right"></i>Ingresar
                </button>
            </div>
            <div class="col-12 text-center mt-2">
                <small class="text-muted">
                    ¿No tienes cuenta?
                    <a href="{{ url_for('auth.registro_usuario') }}" class="text-decoration-none fw-semibold">Crear usuario</a>
                </small>
            </div>
        </form>
    </div>
</div>
{% endblock %}
