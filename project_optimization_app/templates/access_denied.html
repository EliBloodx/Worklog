{% extends 'base.html' %}

{% block title %}Acceso denegado{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card border-0 shadow-sm mx-auto" style="max-width: 620px;">
        <div class="card-body p-4 p-md-5 text-center">
            <div class="display-6 text-danger mb-3">
                <i class="bi bi-shield-lock"></i>
            </div>
            <h1 class="h4 fw-bold mb-2">Acceso denegado</h1>
            <p class="text-muted mb-4">
                Tu usuario no tiene permisos de administrador para usar este modulo.
            </p>
            <form method="post" action="{{ url_for('auth.logout') }}">
                <button class="btn btn-outline-secondary" type="submit">
                    Cerrar sesion
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
